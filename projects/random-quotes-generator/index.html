<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Random Quote Generator</title>
</head>
<body>
    <div class="quote-box-wrap">
        <div class="quote-box">
            <div id="quote">
                “Fate and free will are equally powerful forces but I consider free will to be more important as it is your free will that determines your fate.”
            </div>
            <p id="author-name">– Vyasa</p>
        </div>
        <button onclick="generateNewQuote()">Generate</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
